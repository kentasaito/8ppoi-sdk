<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=360,user-scalable=no">
    <title>8ppoi SDK</title>
    <link rel="icon" href="data:image/svg+xml,">
  </head>
  <body style="margin: 20px;">
    <div id="ui"></div>
    <button id="fullscreen">Fullscreen</button>
    <ul>
      <li><a href="?path=8ppoi/InvaderX/0.0.1/bundle.js">8ppoi/InvaderX/0.0.1/bundle.js</a></li>
      <li><a href="?path=8ppoi/InvaderX/0.0.1/mod.js">8ppoi/InvaderX/0.0.1/mod.js</a></li>
    </ul>
    <script type="module">
      document.getElementById("fullscreen").onclick = () => {
        document.getElementById("ui").requestFullscreen();
      };
      const path = new URL(location).searchParams.get("path") ?? "8ppoi/InvaderX/0.0.1/mod.js";
      const deps = (await import(`./cartridges/${path.replace(/\/[^/]+\.js$/, "")}/deps.js`));
      const cartridge = (await import(`./cartridges/${path}`));
      deps.Console.setup(cartridge, deps);
    </script>
  </body>
</html>
